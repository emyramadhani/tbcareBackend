version: '3.8'

services:
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: tbcare-api-gateway
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET}
      - USER_SERVICE_URL=http://user-service:3001
      - EDUKASI_SERVICE_URL=http://education-service:3002
      - MEDICINE_SERVICE_URL=http://reminder-medicine-service:3003
      - CHATBOT_SERVICE_URL=http://chatbot-service:3004
      - SKRINING_SERVICE_URL=http://skrining-service:3005
      - HEALTH_SERVICE_URL=http://health-service:3006
    depends_on:
      - user-service
      - reminder-medicine-service
      - education-service
      - skrining-service
      - chatbot-service
      - health-service
    networks:
      - tbcare-network

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: tbcare-user-service
    restart: always
    environment:
      - PORT=3001
      - NODE_ENV=production
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=7d
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
      - DEEP_LINK_SCHEME=${DEEP_LINK_SCHEME}
    networks:
      - tbcare-network

  reminder-medicine-service:
    build:
      context: ./reminder-medicine-service
      dockerfile: Dockerfile
    container_name: tbcare-reminder-service
    restart: always
    environment:
      - PORT=3003
      - NODE_ENV=production
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - tbcare-network

  education-service:
    build:
      context: ./education-service
      dockerfile: Dockerfile
    container_name: tbcare-education-service
    restart: always
    environment:
      - PORT=3002
      - NODE_ENV=production
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - BASE_URL=${BASE_URL}
    networks:
      - tbcare-network
    volumes:
      - education_uploads:/app/uploads

  skrining-service:
    build:
      context: ./skrining-service
      dockerfile: Dockerfile
    container_name: tbcare-skrining-service
    restart: always
    environment:
      - PORT=3005
      - NODE_ENV=production
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - tbcare-network

  chatbot-service:
    build:
      context: ./chatbot-service
      dockerfile: Dockerfile
    container_name: tbcare-chatbot-service
    restart: always
    environment:
      - PORT=3004
      - NODE_ENV=production
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - tbcare-network

  health-service:
    build:
      context: ./health-service
      dockerfile: Dockerfile
    container_name: tbcare-health-service
    restart: always
    environment:
      - PORT=3006
      - NODE_ENV=production
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - tbcare-network

networks:
  tbcare-network:
    driver: bridge

volumes:
  education_uploads:

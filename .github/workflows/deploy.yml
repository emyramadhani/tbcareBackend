name: Deploy to GCP VM

on:
  push:
    branches:
      - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy files via scp
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "."
          target: "/home/${{ secrets.USERNAME }}/tbcare-backend"

      - name: Execute Docker Compose via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/${{ secrets.USERNAME }}/tbcare-backend
            
            echo "Membuat file .env dari GitHub Secrets..."
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" > .env
            echo "JWT_EXPIRES_IN=7d" >> .env
            echo "MONGO_URI=${{ secrets.MONGO_URI }}" >> .env
            
            echo "EMAIL_USER=${{ secrets.EMAIL_USER }}" >> .env
            echo "EMAIL_PASS=${{ secrets.EMAIL_PASS }}" >> .env
            echo "DEEP_LINK_SCHEME=${{ secrets.DEEP_LINK_SCHEME }}" >> .env
            echo "BASE_URL=${{ secrets.BASE_URL }}" >> .env

            docker-compose -f docker-compose.prod.yml down
            docker-compose -f docker-compose.prod.yml up -d --build
            docker image prune -af